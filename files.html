<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>URAM-IITD | Team Files</title>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css">

  <!-- Firebase Compat SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

  <script>
    // ─── PASTE YOUR FIREBASE CONFIG HERE ──────────────────────────────────────
        const firebaseConfig = {
    apiKey: "AIzaSyBC9xDdij-KGQEmVCfn2eb3O8J_b39zLMk",
    authDomain: "uram-website.firebaseapp.com",
    projectId: "uram-website",
    storageBucket: "uram-website.firebasestorage.app",
    messagingSenderId: "496212389411",
    appId: "1:496212389411:web:819c7470b6360673050b96"
    }; 
    // ──────────────────────────────────────────────────────────────────────────

    firebase.initializeApp(firebaseConfig);
    const auth     = firebase.auth();
    const storage  = firebase.storage();
    const provider = new firebase.auth.GoogleAuthProvider();

    /* ── helpers ── */
    function fmt(bytes) {
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 ** 2) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / 1024 ** 2).toFixed(2) + " MB";
    }

    function ext(name) { return name.split(".").pop().toLowerCase(); }

    function icon(name) {
      const e = ext(name);
      const map = {
        pdf:"📄", doc:"📝", docx:"📝", xls:"📊", xlsx:"📊",
        ppt:"📋", pptx:"📋", zip:"🗜️", rar:"🗜️",
        jpg:"🖼️", jpeg:"🖼️", png:"🖼️", gif:"🖼️",
        mp4:"🎬", mov:"🎬", py:"🐍", csv:"📊"
      };
      return map[e] || "📁";
    }

    function timeAgo(ms) {
      const s = Math.floor((Date.now() - ms) / 1000);
      if (s < 60)    return "just now";
      if (s < 3600)  return Math.floor(s / 60) + "m ago";
      if (s < 86400) return Math.floor(s / 3600) + "h ago";
      return Math.floor(s / 86400) + "d ago";
    }

    /* ── auth state ── */
    auth.onAuthStateChanged(user => {
      document.getElementById("login-screen").style.display = user ? "none"  : "flex";
      document.getElementById("app-screen").style.display   = user ? "block" : "none";
      if (user) {
        document.getElementById("user-name").textContent  = user.displayName;
        document.getElementById("user-email").textContent = user.email;
        if (user.photoURL) document.getElementById("user-avatar").src = user.photoURL;
        loadFiles();
      }
    });

    /* ── sign in / out ── */
    function signIn() {
      auth.signInWithPopup(provider)
        .catch(e => showToast("Sign-in failed: " + e.message, true));
    }

    function signOutUser() {
      auth.signOut();
      document.getElementById("file-list").innerHTML = "";
    }

    /* ── upload ── */
    function handleUpload() {
      const files = document.getElementById("file-input").files;
      if (!files.length) return;
      [...files].forEach(file => uploadFile(file));
    }

    function handleDrop(e) {
      e.preventDefault();
      document.getElementById("drop-zone").classList.remove("drag-over");
      [...e.dataTransfer.files].forEach(file => uploadFile(file));
    }

    function handleDragOver(e) {
      e.preventDefault();
      document.getElementById("drop-zone").classList.add("drag-over");
    }

    function handleDragLeave() {
      document.getElementById("drop-zone").classList.remove("drag-over");
    }

    function uploadFile(file) {
      const user   = auth.currentUser;
      const folder = document.getElementById("folder-select").value;
      const path   = folder + "/" + file.name;
      const task   = storage.ref(path).put(file, {
        customMetadata: { uploadedBy: user.displayName, email: user.email }
      });

      const id  = "prog-" + Date.now();
      const bar = addProgressBar(id, file.name);

      task.on("state_changed",
        snap => {
          const pct = Math.round(snap.bytesTransferred / snap.totalBytes * 100);
          bar.querySelector(".prog-fill").style.width  = pct + "%";
          bar.querySelector(".prog-label").textContent = pct + "%";
        },
        err  => { showToast("Upload failed: " + err.message, true); bar.remove(); },
        ()   => { bar.remove(); showToast("✓ " + file.name + " uploaded!"); loadFiles(); }
      );
    }

    function addProgressBar(id, name) {
      const wrap = document.getElementById("progress-wrap");
      const bar  = document.createElement("div");
      bar.id = id;
      bar.className = "prog-bar";
      bar.innerHTML = `<span class="prog-name">${icon(name)} ${name}</span>
        <div class="prog-track"><div class="prog-fill"></div></div>
        <span class="prog-label">0%</span>`;
      wrap.appendChild(bar);
      return bar;
    }

    /* ── load & render files ── */
    async function loadFiles() {
      const folder = document.getElementById("folder-select").value;
      const list   = document.getElementById("file-list");
      const search = (document.getElementById("search-input")?.value || "").toLowerCase();

      list.innerHTML = `<div class="loading-files">Loading files…</div>`;

      try {
        const res   = await storage.ref(folder).listAll();
        const items = await Promise.all(res.items.map(async item => {
          const [url, meta] = await Promise.all([item.getDownloadURL(), item.getMetadata()]);
          return { name: item.name, url, meta, ref: item };
        }));

        const filtered = search
          ? items.filter(i => i.name.toLowerCase().includes(search))
          : items;

        if (!filtered.length) {
          list.innerHTML = `<div class="empty-state">
            <span style="font-size:2.5rem">📂</span>
            <p>${search ? "No files match your search." : "No files uploaded yet. Be the first!"}</p>
          </div>`;
          document.getElementById("file-count").textContent = "0 files";
          return;
        }

        document.getElementById("file-count").textContent =
          filtered.length + " file" + (filtered.length !== 1 ? "s" : "");

        list.innerHTML = filtered.map(({ name, url, meta, ref: fRef }) => {
          const by   = meta.customMetadata?.uploadedBy || "Unknown";
          const time = timeAgo(new Date(meta.timeCreated).getTime());
          const size = fmt(meta.size);
          return `
          <div class="file-row">
            <span class="file-icon">${icon(name)}</span>
            <div class="file-info">
              <span class="file-name">${name}</span>
              <span class="file-meta">${size} · ${by} · ${time}</span>
            </div>
            <div class="file-actions">
              <a class="btn-dl" href="${url}" download="${name}" target="_blank">↓ Download</a>
              <button class="btn-del" onclick="deleteFile('${fRef.fullPath}', '${name}')">✕</button>
            </div>
          </div>`;
        }).join("");

      } catch (e) {
        list.innerHTML = `<div class="empty-state">
          <span style="font-size:2.5rem">🚫</span>
          <p style="color:#c03030;font-weight:700">Access denied.</p>
          <p>Your account is not authorised to access team files.<br>
          Contact Prof. Kota to request access.</p>
        </div>`;
      }
    }

    /* ── delete ── */
    async function deleteFile(path, name) {
      if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
      try {
        await storage.ref(path).delete();
        showToast("🗑️ " + name + " deleted.");
        loadFiles();
      } catch (e) {
        showToast("Delete failed: " + e.message, true);
      }
    }

    /* ── search & folder switch ── */
    function onFolderChange() { loadFiles(); }
    function onSearch()       { loadFiles(); }

    /* ── toast ── */
    function showToast(msg, err = false) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.className   = "toast show" + (err ? " err" : "");
      setTimeout(() => { t.className = "toast"; }, 3500);
    }
  </script>

  <style>
    :root {
      --surface: rgba(255,255,255,0.9);
      --surface-strong: rgba(255,255,255,0.96);
      --ink: #162126;
      --muted: #5a6a70;
      --accent: #0e646d;
      --accent-deep: #0a4750;
      --highlight: #db8a3d;
      --line: rgba(0,0,0,0.08);
      --radius: 24px;
      --shadow: 0 20px 60px rgba(0,0,0,0.1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Manrope", sans-serif;
      background: radial-gradient(circle at 10% 10%, rgba(219,138,61,0.15), transparent 26%),
                  radial-gradient(circle at 88% 12%, rgba(14,100,109,0.14), transparent 28%),
                  linear-gradient(180deg, #f8f5ef, #f2ede5);
      min-height: 100vh;
      color: var(--ink);
    }

    .container { width: min(1000px,92%); margin: auto; padding: 24px 0 60px; }

    /* ── LOGIN SCREEN ── */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      gap: 20px;
    }

    .login-card {
      background: var(--surface-strong);
      border-radius: 28px;
      padding: 48px 44px;
      box-shadow: var(--shadow);
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    .login-card h1 {
      font-family: "Playfair Display", serif;
      font-size: 2rem;
      margin: 0 0 10px;
    }

    .login-card p { color: var(--muted); line-height: 1.7; margin: 0 0 28px; }

    .btn-google {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--accent);
      color: #fff;
      font-family: "Manrope", sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      border: none;
      border-radius: 999px;
      padding: 14px 28px;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }

    .btn-google:hover { background: var(--accent-deep); transform: translateY(-2px); }

    .lock-icon { font-size: 2.4rem; margin-bottom: 6px; }

    /* ── APP SCREEN ── */
    #app-screen { display: none; }

    /* ── TOP BAR ── */
    .top-bar {
      background: var(--surface-strong);
      border-radius: 20px;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
      flex-wrap: wrap;
    }

    .page-title {
      font-family: "Playfair Display", serif;
      font-size: 1.7rem;
      margin: 0;
    }

    .user-info { display: flex; align-items: center; gap: 12px; }

    #user-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--accent);
    }

    .user-text { line-height: 1.3; }
    .user-text strong { display: block; font-size: 0.9rem; }
    .user-text span { font-size: 0.78rem; color: var(--muted); }

    .btn-signout {
      background: rgba(14,100,109,0.08);
      color: var(--accent-deep);
      border: none;
      border-radius: 999px;
      padding: 8px 18px;
      font-family: "Manrope", sans-serif;
      font-weight: 700;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-signout:hover { background: rgba(14,100,109,0.16); }

    /* ── UPLOAD ZONE ── */
    .upload-card {
      background: var(--surface-strong);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }

    .upload-card h2 {
      font-family: "Playfair Display", serif;
      font-size: 1.4rem;
      margin: 0 0 18px;
    }

    .upload-controls {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }

    .folder-select {
      background: rgba(14,100,109,0.07);
      border: 1.5px solid rgba(14,100,109,0.2);
      color: var(--ink);
      border-radius: 999px;
      padding: 8px 16px;
      font-family: "Manrope", sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
    }

    #drop-zone {
      border: 2px dashed rgba(14,100,109,0.3);
      border-radius: 18px;
      padding: 36px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: rgba(14,100,109,0.03);
    }

    #drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(14,100,109,0.08);
    }

    #drop-zone p { margin: 8px 0 0; color: var(--muted); font-size: 0.92rem; }

    .drop-icon { font-size: 2rem; }

    .btn-choose {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 10px 22px;
      font-family: "Manrope", sans-serif;
      font-weight: 700;
      font-size: 0.88rem;
      cursor: pointer;
      margin-top: 12px;
      transition: background 0.2s, transform 0.2s;
    }

    .btn-choose:hover { background: var(--accent-deep); transform: translateY(-2px); }

    #file-input { display: none; }

    /* ── PROGRESS ── */
    #progress-wrap { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }

    .prog-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(14,100,109,0.06);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.86rem;
    }

    .prog-name { flex: 1; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .prog-track {
      width: 120px;
      height: 6px;
      background: rgba(0,0,0,0.1);
      border-radius: 99px;
      overflow: hidden;
    }

    .prog-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.2s; }
    .prog-label { font-size: 0.78rem; color: var(--muted); min-width: 32px; text-align: right; }

    /* ── FILE LIST ── */
    .files-card {
      background: var(--surface-strong);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: var(--shadow);
    }

    .files-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .files-header h2 { font-family: "Playfair Display", serif; font-size: 1.4rem; margin: 0; }

    .files-toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

    .search-input {
      background: rgba(14,100,109,0.06);
      border: 1.5px solid rgba(14,100,109,0.15);
      border-radius: 999px;
      padding: 8px 16px;
      font-family: "Manrope", sans-serif;
      font-size: 0.88rem;
      color: var(--ink);
      width: 200px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input:focus { border-color: var(--accent); }

    .file-count { font-size: 0.82rem; color: var(--muted); font-weight: 600; }

    /* ── FILE ROW ── */
    .file-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid var(--line);
      margin-bottom: 10px;
      transition: background 0.15s;
    }

    .file-row:hover { background: rgba(14,100,109,0.04); }

    .file-icon { font-size: 1.6rem; flex-shrink: 0; }

    .file-info { flex: 1; overflow: hidden; }

    .file-name {
      display: block;
      font-weight: 700;
      font-size: 0.95rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-meta { display: block; font-size: 0.78rem; color: var(--muted); margin-top: 3px; }

    .file-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

    .btn-dl {
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      border-radius: 999px;
      padding: 7px 16px;
      font-size: 0.82rem;
      font-weight: 700;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .btn-dl:hover { background: var(--accent-deep); }

    .btn-del {
      background: rgba(200,50,50,0.08);
      color: #c03030;
      border: none;
      border-radius: 999px;
      width: 32px;
      height: 32px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-del:hover { background: rgba(200,50,50,0.18); }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .loading-files {
      text-align: center;
      padding: 32px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--ink);
      color: #fff;
      padding: 12px 24px;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 9999;
      white-space: nowrap;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.err  { background: #c03030; }

    @media (max-width: 640px) {
      .top-bar { gap: 12px; }
      .file-row { flex-wrap: wrap; gap: 10px; }
      .file-actions { width: 100%; justify-content: flex-end; }
      .search-input { width: 100%; }
    }
  </style>
</head>

<body>
  <div id="header-placeholder"></div>

  <div class="container">

    <!-- LOGIN SCREEN -->
    <div id="login-screen">
      <div class="login-card">
        <div class="lock-icon">🔒</div>
        <h1>Team File Hub</h1>
        <p>Sign in with your Google account to access and share files with the URAM-IITD team.</p>
        <button class="btn-google" onclick="signIn()">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#fff"/>
            <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#fff" opacity=".85"/>
            <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#fff" opacity=".7"/>
            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#fff" opacity=".6"/>
          </svg>
          Sign in with Google
        </button>
      </div>
    </div>

    <!-- APP SCREEN -->
    <div id="app-screen">

      <!-- Top bar -->
      <div class="top-bar">
        <h1 class="page-title">Team File Hub</h1>
        <div class="user-info">
          <img id="user-avatar" src="" alt="avatar" onerror="this.style.display='none'"/>
          <div class="user-text">
            <strong id="user-name"></strong>
            <span id="user-email"></span>
          </div>
          <button class="btn-signout" onclick="signOutUser()">Sign out</button>
        </div>
      </div>

      <!-- Upload card -->
      <div class="upload-card">
        <h2>Upload Files</h2>
        <div class="upload-controls">
          <label style="font-size:0.85rem;font-weight:700;color:var(--muted)">Folder:</label>
          <select class="folder-select" id="folder-select" onchange="onFolderChange()">
            <option value="general">General</option>
            <option value="data">Data &amp; Datasets</option>
            <option value="reports">Reports</option>
            <option value="presentations">Presentations</option>
            <option value="papers">Papers &amp; Publications</option>
          </select>
        </div>

        <div id="drop-zone"
             ondrop="handleDrop(event)"
             ondragover="handleDragOver(event)"
             ondragleave="handleDragLeave()"
             onclick="document.getElementById('file-input').click()">
          <div class="drop-icon">☁️</div>
          <p>Drag &amp; drop files here, or click to browse</p>
          <p style="font-size:0.8rem;margin-top:4px">Any file type · No size limit enforced by UI</p>
          <button class="btn-choose" onclick="event.stopPropagation(); document.getElementById('file-input').click()">Choose Files</button>
          <input type="file" id="file-input" multiple onchange="handleUpload()"/>
        </div>

        <div id="progress-wrap"></div>
      </div>

      <!-- File list -->
      <div class="files-card">
        <div class="files-header">
          <h2>Files <span class="file-count" id="file-count"></span></h2>
          <div class="files-toolbar">
            <input class="search-input" id="search-input" type="search"
                   placeholder="Search files…" oninput="onSearch()"/>
          </div>
        </div>
        <div id="file-list">
          <div class="empty-state">Sign in to view files.</div>
        </div>
      </div>

    </div><!-- /app-screen -->
  </div>

  <div class="toast" id="toast"></div>

  <script src="components.js"></script>
</body>
</html>
