<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>URAM-IITD | Collaborations</title>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --surface: rgba(255,255,255,0.9);
      --surface-strong: rgba(255,255,255,0.95);
      --ink:#162126;
      --muted:#5a6a70;
      --accent:#0e646d;
      --accent-deep:#0a4750;
      --shadow:0 20px 60px rgba(0,0,0,0.1);
    }

    body {
      margin:0;
      font-family:"Manrope",sans-serif;
      background:#f5f2ea;
      color:var(--ink);
    }

    .container {
      width:min(1100px,90%);
      margin:auto;
      padding:20px 0;
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    /* ===== HEADER ===== */

    .site-header {
      position: sticky;
      top: 0;
      z-index: 50;
      margin-bottom: 20px;
      backdrop-filter: blur(18px);
    }

    .header-bar {
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      padding:12px 18px;
      background:rgba(255,255,255,0.75);
      border-radius:20px;
      box-shadow:var(--shadow);
    }

    .brand {
      display:flex;
      flex-direction:column;
    }

    .brand-kicker {
      font-size:0.7rem;
      letter-spacing:0.2em;
      text-transform:uppercase;
      color:var(--accent);
      font-weight:800;
    }

    .brand-name {
      margin:0;
      font-family:"Playfair Display",serif;
      font-size:1.4rem;
    }

    .nav {
      display:flex;
      gap:8px;
    }

    .nav a {
      text-decoration:none;
      color:var(--muted);
      padding:8px 12px;
      border-radius:999px;
      font-size:0.85rem;
    }

    .nav a.active,
    .nav a:hover {
      background:rgba(14,100,109,0.1);
      color:var(--accent-deep);
    }

    /* MOBILE MENU */
    .menu-toggle {
      display:none;
      flex-direction:column;
      gap:4px;
      background:none;
      border:none;
      cursor:pointer;
    }

    .menu-toggle span {
      width:22px;
      height:2px;
      background:var(--ink);
      display:block;
    }

    @media(max-width:768px){
      .menu-toggle{
        display:flex;
      }

      .nav{
        position:absolute;
        top:70px;
        right:20px;
        background:var(--surface-strong);
        flex-direction:column;
        padding:14px;
        border-radius:16px;
        box-shadow:var(--shadow);
        display:none;
      }

      .nav.show{
        display:flex;
      }
    }

    /* ===== ORIGINAL BOX (UNCHANGED LOOK) ===== */

    .content-center {
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .box {
      background:white;
      padding:40px 60px;
      border-radius:20px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      font-family:"Playfair Display",serif;
      font-size:2.5rem;
      margin:0;
    }

    @media(max-width:768px){
      .box {
        padding:30px;
      }
      h1 {
        font-size:2rem;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-bar">

      <div class="brand">
        <span class="brand-kicker">IIT Delhi Research Group</span>
        <p class="brand-name">URAM-IITD</p>
      </div>

      <button class="menu-toggle" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="nav" id="navMenu">
        <a href="index.html">Home</a>
        <a href="projects.html">Projects</a>
        <a href="teaching.html">Teaching</a>
        <a href="publications.html">Publications</a>
        <a href="members.html">Members</a>
        <a href="collabrations.html" class="active">Collaborations</a>
        <a href="current-openings.html">Current Openings</a>
        <a href="contact.html">Contact</a>
      </nav>

    </div>
  </header>

  <!-- CENTER CONTENT -->
  <div class="content-center">
    <div class="box">
      <h1>Updating soon</h1>
    </div>
  </div>

</div>

<script>
function toggleMenu() {
  document.getElementById("navMenu").classList.toggle("show");
}
</script>

</body>
